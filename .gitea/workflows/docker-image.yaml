name: Build and push image for Gitainer

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        name: Check out code

      - name: Build Test Image
        run: docker build -f packages/gitainer/Dockerfile.test -t gitainer-test .

      - name: Run Tests
        run: docker run --privileged --rm -w /app gitainer-test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: martindmtrv
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/gitainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/martindmtrv/gitainer:v1
            ghcr.io/martindmtrv/gitainer:latest
